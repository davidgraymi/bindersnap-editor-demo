# Bindersnap local development stack
# Run: docker compose up
# Copy tests/.env.example to .env before starting the stack.
# See tests/README.md for full usage.
# This is a developer tool. It is never deployed. The Docker Compose config
# uses insecure defaults (fixed passwords, no TLS) that are intentional for
# local speed. Do not use this config as a basis for any production deployment.

services:
  gitea-init:
    image: alpine:latest
    container_name: bindersnap-gitea-init
    user: "0:0"
    command: ["sh", "-c", "chown -R 1000:1000 /data"]
    volumes:
      - gitea-data:/data

  gitea:
    image: gitea/gitea:1.25
    container_name: bindersnap-gitea
    restart: unless-stopped
    depends_on:
      gitea-init:
        condition: service_completed_successfully
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__server__ROOT_URL=http://localhost:3000
      - GITEA__server__HTTP_PORT=3000
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__database__PATH=/data/gitea.db
      - GITEA__service__DISABLE_REGISTRATION=false
      - GITEA__cors__ENABLED=true
      - GITEA__cors__ALLOW_DOMAIN=http://localhost:${APP_PORT:-5173}
      - GITEA__cors__METHODS=GET,POST,PUT,PATCH,DELETE,OPTIONS
      - GITEA__cors__ALLOW_CREDENTIALS=true
      - GITEA__log__LEVEL=warn
    ports:
      - "3000:3000"
    volumes:
      - gitea-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 20s

  seed:
    image: oven/bun:1
    container_name: bindersnap-seed
    depends_on:
      gitea:
        condition: service_healthy
    working_dir: /workspace
    volumes:
      - ./:/workspace:ro
    command: ["bun", "tests/seed.ts"]
    environment:
      - GITEA_URL=http://gitea:3000

  hocuspocus:
    build:
      context: .
      dockerfile: services/hocuspocus/Dockerfile
    container_name: bindersnap-hocuspocus
    ports:
      - "1234:1234"

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: bindersnap-api
    depends_on:
      gitea:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    environment:
      - API_PORT=${API_PORT:-8787}
      - PORT=${API_PORT:-8787}
      - GITEA_INTERNAL_URL=${GITEA_INTERNAL_URL:-http://gitea:3000}
      - GITEA_ADMIN_USER=${GITEA_ADMIN_USER:-alice}
      - GITEA_ADMIN_PASS=${GITEA_ADMIN_PASS:-bindersnap-dev}
      - BINDERSNAP_APP_ORIGIN=http://localhost:${APP_PORT:-5173}
      - BINDERSNAP_USER_EMAIL_DOMAIN=${BINDERSNAP_USER_EMAIL_DOMAIN:-users.bindersnap.local}
      - BINDERSNAP_GITEA_TOKEN_SCOPES=${BINDERSNAP_GITEA_TOKEN_SCOPES:-write:user,write:repository,write:issue}
      - BINDERSNAP_REQUIRE_HTTPS=${BINDERSNAP_REQUIRE_HTTPS:-false}
      - BINDERSNAP_AUTH_RATE_LIMIT_ENABLED=${BINDERSNAP_AUTH_RATE_LIMIT_ENABLED:-true}
      - BINDERSNAP_AUTH_RATE_LIMIT_WINDOW_MS=${BINDERSNAP_AUTH_RATE_LIMIT_WINDOW_MS:-600000}
      - BINDERSNAP_AUTH_RATE_LIMIT_MAX=${BINDERSNAP_AUTH_RATE_LIMIT_MAX:-20}
      - BINDERSNAP_DEV_FEATURES=${BINDERSNAP_DEV_FEATURES:-true}
      - BINDERSNAP_SESSIONS_DB_PATH=/var/lib/bindersnap/sessions.db
      - BINDERSNAP_FREE_USERS=${BINDERSNAP_FREE_USERS:-alice,bob}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_PRICE_ID=${STRIPE_PRICE_ID:-}
    ports:
      - "${API_PORT:-8787}:${API_PORT:-8787}"
    volumes:
      - api-data:/var/lib/bindersnap

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_PORT: ${APP_PORT:-5173}
    container_name: bindersnap-app
    depends_on:
      api:
        condition: service_started
      gitea:
        condition: service_healthy
      hocuspocus:
        condition: service_started
      seed:
        condition: service_completed_successfully
    environment:
      - APP_PORT=${APP_PORT:-5173}
      - PORT=${APP_PORT:-5173}
      - BUN_PUBLIC_API_BASE_URL=http://localhost:${API_PORT:-8787}
      - BUN_PUBLIC_API_URL=http://localhost:${API_PORT:-8787}
      - VITE_API_URL=http://localhost:${API_PORT:-8787}
      - BUN_PUBLIC_GITEA_URL=http://localhost:3000
      - VITE_GITEA_URL=http://localhost:3000
      - BUN_PUBLIC_HOCUSPOCUS_URL=ws://localhost:1234
      - VITE_HOCUSPOCUS_URL=ws://localhost:1234
      - GITEA_INTERNAL_URL=${GITEA_INTERNAL_URL:-http://gitea:3000}
      - GITEA_ADMIN_USER=${GITEA_ADMIN_USER:-alice}
      - GITEA_ADMIN_PASS=${GITEA_ADMIN_PASS:-bindersnap-dev}
    ports:
      - "${APP_PORT:-5173}:${APP_PORT:-5173}"
    volumes:
      - .:/app
      - app-node-modules:/app/node_modules

volumes:
  gitea-data:
  app-node-modules:
  api-data:

networks:
  default:
    name: bindersnap-dev
