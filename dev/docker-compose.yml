# Bindersnap local development stack
# Run: docker compose up
# Copy dev/.env.example to dev/.env before starting the stack.
# See dev/README.md for full usage.

services:
  gitea-init:
    image: alpine:latest
    container_name: bindersnap-gitea-init
    user: "0:0"
    command: ["sh", "-c", "chown -R 1000:1000 /data"]
    volumes:
      - gitea-data:/data

  gitea:
    image: gitea/gitea:latest
    container_name: bindersnap-gitea
    restart: unless-stopped
    depends_on:
      gitea-init:
        condition: service_completed_successfully
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__server__ROOT_URL=http://localhost:3000
      - GITEA__server__HTTP_PORT=3000
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__database__PATH=/data/gitea.db
      - GITEA__service__DISABLE_REGISTRATION=false
      - GITEA__cors__ENABLED=true
      - GITEA__cors__ALLOW_DOMAIN=http://localhost:5173
      - GITEA__cors__METHODS=GET,POST,PUT,PATCH,DELETE,OPTIONS
      - GITEA__cors__ALLOW_CREDENTIALS=true
      - GITEA__log__LEVEL=warn
    ports:
      - "3000:3000"
    volumes:
      - gitea-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 20s

  seed:
    image: oven/bun:1
    container_name: bindersnap-seed
    depends_on:
      gitea:
        condition: service_healthy
    working_dir: /workspace
    volumes:
      - ./:/workspace/dev:ro
    command: ["bun", "dev/tests/seed.ts"]
    environment:
      - GITEA_URL=http://gitea:3000

  hocuspocus:
    build:
      context: ..
      dockerfile: dev/hocuspocus/Dockerfile
    container_name: bindersnap-hocuspocus
    ports:
      - "1234:1234"

  app:
    build:
      context: ..
      dockerfile: dev/app/Dockerfile
    container_name: bindersnap-app
    depends_on:
      gitea:
        condition: service_healthy
      hocuspocus:
        condition: service_started
      seed:
        condition: service_completed_successfully
    environment:
      - BUN_PUBLIC_GITEA_URL=http://localhost:3000
      - VITE_GITEA_URL=http://localhost:3000
      - BUN_PUBLIC_HOCUSPOCUS_URL=ws://localhost:1234
      - VITE_HOCUSPOCUS_URL=ws://localhost:1234
      - BUN_PUBLIC_DEV_AUTO_LOGIN=${BINDERSNAP_DEV_AUTO_LOGIN:-true}
      - VITE_DEV_AUTO_LOGIN=${BINDERSNAP_DEV_AUTO_LOGIN:-true}
      - BINDERSNAP_DEV_AUTO_LOGIN=${BINDERSNAP_DEV_AUTO_LOGIN:-true}
      - GITEA_INTERNAL_URL=${GITEA_INTERNAL_URL:-http://gitea:3000}
      - GITEA_ADMIN_USER=${GITEA_ADMIN_USER:-alice}
      - GITEA_ADMIN_PASS=${GITEA_ADMIN_PASS:-bindersnap-dev}
    ports:
      - "5173:3000"
    volumes:
      - ..:/app
      - app-node-modules:/app/node_modules

volumes:
  gitea-data:
  app-node-modules:

networks:
  default:
    name: bindersnap-dev
