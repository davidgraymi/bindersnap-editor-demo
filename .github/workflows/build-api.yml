name: Build API Image

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-api.yml"
      - "services/api/**"
      - "packages/gitea-client/**"
      - "package.json"
      - "bun.lock"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-api:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image owner
        run: echo "IMAGE_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/api/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_OWNER }}/bindersnap-api:${{ github.sha }}
            ghcr.io/${{ env.IMAGE_OWNER }}/bindersnap-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Inspect published manifest
        run: docker buildx imagetools inspect ghcr.io/${IMAGE_OWNER}/bindersnap-api:${GITHUB_SHA}
